<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요금 관리 - PickIt</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
</head>

<body>
    <!-- 1. 왼쪽 메뉴바 -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <a href="dashboard.html"><img src="assets/logo.png" alt="PickIt"></a>
        </div>

        <ul class="nav-menu">
            <a href="dashboard.html" style="text-decoration:none; color:inherit;">
                <li class="nav-item">
                    <span style="font-size: 20px;"></span> 홈
                </li>
            </a>
            <a href="settings.html" style="text-decoration:none; color:inherit;">
                <li class="nav-item">
                    <span style="font-size: 20px;"></span> 넛지 설정
                </li>
            </a>
            <a href="statistics.html" style="text-decoration:none; color:inherit;">
                <li class="nav-item">
                    <span style="font-size: 20px;"></span> 성과 통계
                </li>
            </a>
            <a href="billing.html" style="text-decoration:none; color:inherit;">
                <li class="nav-item active">
                    <span style="font-size: 20px;"></span> 요금 관리
                </li>
            </a>
        </ul>

        <div class="sidebar-footer">
            <div class="shop-name">사장님 쇼핑몰</div>
            <a href="index.html" style="text-decoration:none;"><button class="logout-btn">로그아웃</button></a>
        </div>
    </aside>

    <!-- 2. 오른쪽 메인 내용 -->
    <main class="main-content">
        <header class="page-header">
            <h1 class="page-title">요금 관리</h1>
        </header>

        <!-- 맨 위: 무료 체험 진행 상태 -->
        <div class="billing-section">
            <div class="trial-status-text">
                14일 무료 체험 중 <span class="trial-highlight">7일</span> 남았습니다
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill"></div>
            </div>
        </div>

        <!-- 중간: 이번 달 청구서 상자 -->
        <div class="billing-section" style="padding-top: 64px; padding-bottom: 64px;">
            <div class="receipt-box">
                <div class="receipt-row">
                    <span>피킷이 벌어다 준 추가 매출액</span>
                    <span>1,000,000원</span>
                </div>
                <div class="receipt-row total">
                    <span>피킷 이용료 (5%)</span>
                    <span class="receipt-total-value">50,000원</span>
                </div>
                <div class="roi-badge-container">
                    <div class="roi-badge"> 피킷 이용료 5만 원으로 100만 원의 매출을 방어했습니다! (ROI 2000%)</div>
                </div>
            </div>
        </div>

        <!-- 아래: 결제 수단 등록 구역 -->
        <div class="billing-section" style="padding-top: 56px; padding-bottom: 56px;">
            <div class="card-registration">
                <div class="card-title">요금이 결제될 카드를 등록해 주세요.</div>

                <div class="card-inputs">
                    <input type="text" class="card-input" placeholder="0000" maxlength="4">
                    <input type="text" class="card-input" placeholder="0000" maxlength="4">
                    <input type="text" class="card-input" placeholder="0000" maxlength="4">
                    <input type="text" class="card-input" placeholder="0000" maxlength="4">
                </div>

                <button class="save-card-btn" onclick="alert('카드 정보가 안전하게 저장되었습니다!')">결제 수단 저장하기</button>
            </div>
        </div>

        <!-- 맨 밑 구석: 서비스 탈퇴하기 -->
        <div class="withdraw-container">
            <button class="withdraw-btn"
                onclick="if(confirm('정말로 서비스를 탈퇴하시겠습니까? 피킷이 벌어다 준 추가 매출을 포기하게 됩니다.')) alert('탈퇴 처리가 완료되었습니다.');">서비스
                탈퇴하기</button>
        </div>
    </main>

    <!-- 카드 번호 입력 편의를 위한 간단한 스크립트 -->
    <script>
        const inputs = document.querySelectorAll('.card-input');
        inputs.forEach((input, index) => {
            input.addEventListener('keyup', (e) => {
                // 4자리가 다 차면 다음 칸으로 이동
                if (e.target.value.length === 4 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                // 백스페이스를 눌렀는데 빈 칸이면 이전 칸으로 이동
                if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
                // 숫자만 입력 가능하도록 정규식 처리
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
            });
        });
    </script>
</body>

</html>
