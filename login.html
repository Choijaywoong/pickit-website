<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - PickIt</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
</head>

<body>
    <div class="auth-container">
        <div class="auth-logo">
            <a href="index.html"><img src="assets/logo.png" alt="PickIt"></a>
        </div>
        <h1 class="auth-title">환영합니다!</h1>
        <p class="auth-subtitle">계정 정보를 입력하여 대시보드에 접속하세요.</p>

        <form action="dashboard.html">
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호를 입력해 주세요" required>
            </div>
            <button type="submit" class="auth-btn">로그인 완료</button>
        </form>

        <div class="auth-footer">
            처음이신가요? <a href="signup.html">회원가입하기</a>
        </div>
    </div>
</body>

</html>
